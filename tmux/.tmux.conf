# -----------------------------
# Prefix key
# -----------------------------
set-option -g prefix C-a
unbind-key C-a
bind-key C-a send-prefix

# -----------------------------
# Pane navigation (vim-style)
# -----------------------------
bind k selectp -U
bind j selectp -D
bind h selectp -L
bind l selectp -R

# -----------------------------
# Window navigation
# -----------------------------
bind -n S-Left previous-window
bind -n S-Right next-window

# -----------------------------
# Mouse + copy mode
# -----------------------------
setw -g mouse on
setw -g mode-keys vi

# -----------------------------
# Split shortcuts
# -----------------------------
bind-key v split-window -h
bind-key h split-window -v

# -----------------------------
# macOS pbcopy
# ------------------------------
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# -----------------------------
# Plugins
# -----------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Nord theme
set -g @plugin "arcticicestudio/nord-tmux"
set -g @nord_tmux_show_status_content "1"

# -----------------------------
# Initialize TPM (keep near bottom)
# -----------------------------
run -b '~/.tmux/plugins/tpm/tpm'

# -----------------------------
# Window label override
# -----------------------------
# Show "window_name index" (e.g. "editor 1")
# Overrides Nord theme window format → must be AFTER plugins
#set -g window-status-format '#[fg=white,bg=brightblack]#W #I'
#set -g window-status-current-format '#[fg=black,bg=cyan,bold]#W #I'
